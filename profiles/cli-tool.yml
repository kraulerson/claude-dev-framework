name: cli-tool
description: Command-line tools, scripts, and terminal utilities
inherits: _base

rules:
  - version-bump
  - changelog-update
  - future-scalability

hooks:
  - pre-commit-checks
  - branch-safety

discovery_questions:
  - key: language
    question: "What language is this CLI tool written in?"
    examples: "Python, Rust, Go, Node.js, Bash"
  - key: distribution
    question: "How is this tool distributed?"
    examples: "npm, pip, cargo, homebrew, binary releases, script only"
  - key: users
    question: "Who uses this tool?"
    examples: "just me, my team, open source / public"

suggests:
  changelogFile: "CHANGELOG.md"
  protectedBranches: ["main", "master"]
